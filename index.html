<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم زينب — علاء</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root{ --rose:#e91e63; --night1:#0b0f2b; --night2:#1a0933; }
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo', sans-serif; min-height:100vh;
  background:linear-gradient(135deg,#fdecef,#f8bbd0);
  display:flex; justify-content:center; align-items:center;
  overflow:hidden; transition:2.5s ease;
}
body.night{ background:linear-gradient(180deg,var(--night1),var(--night2),#000); color:#ffeef4; }
.blob {
  position: fixed; width: 300px; height: 300px;
  background: rgba(233, 30, 99, 0.1); filter: blur(70px);
  border-radius: 50%; z-index: -1; animation: move 25s infinite alternate;
}
@keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(100vw, 100vh); } }
.world{
  width:92%; max-width:430px; padding:35px; border-radius:40px;
  background:rgba(255,255,255,.95); text-align:center;
  box-shadow:0 25px 60px rgba(233,30,99,.3);
  position:relative; z-index:5; animation: heartBeat 5s infinite;
}
@keyframes heartBeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
body.night .world{ background:rgba(18,10,36,.9); }
h1{color:var(--rose); font-size:2rem; margin-bottom:10px}
#loveMessage{ margin:25px 0; min-height:120px; line-height:1.8; font-size:1.15rem; color:#444; }
body.night #loveMessage{ color: #eee; }
.actions{display:flex; flex-direction:column; gap:12px}
button{ border:none; border-radius:50px; padding:16px; font-weight:bold; color:white; cursor:pointer; transition:0.3s; }
.btn-heart{background: linear-gradient(45deg, #e91e63, #ff6090);}
.btn-whisper{background: linear-gradient(45deg, #9c27b0, #ba68c8);}
.btn-music{background: linear-gradient(45deg, #03a9f4, #4fc3f7);}
#moon{
  position:fixed; top:25px; right:25px; width:80px; height:80px;
  border-radius:50%; background:#fff4c6; cursor:pointer;
  box-shadow:0 0 40px rgba(255,255,220,0.5); overflow:hidden; z-index:10;
}
#moonShadow{ position:absolute; inset:0; background:var(--night1); transform:translateX(100%); transition:2s; }
#moonWhisper{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:1s; font-family:'Amiri'; color:var(--rose); font-weight:bold; }
.star{ position:fixed; background:white; border-radius:50%; z-index:0; animation:twinkle infinite alternate; }
@keyframes twinkle{from{opacity:0.2}to{opacity:1}}
.heart{ position:fixed; pointer-events:none; font-size:20px; animation:float 2.5s forwards; }
@keyframes float{ 0%{transform:translate(0,0);opacity:1} 100%{transform:translate(var(--x),-250px);opacity:0} }
#lockScreen{ position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(15px); display:flex; justify-content:center; align-items:center; z-index:9999; transition:1s; }
.lockCard{ background:white; padding:40px 30px; border-radius:35px; text-align:center; width:300px; }
#pinInput{ width:100%; padding:15px; font-size:1.8rem; text-align:center; border-radius:15px; border:2px solid #f48fb1; margin-bottom:20px; outline:none; letter-spacing:5px; }
</style>
</head>
<body>
<div class="blob"></div>
<div id="lockScreen">
  <div class="lockCard">
    <h2 style="color:var(--rose); margin-bottom:10px">عالم زينب</h2>
    <p style="margin-bottom:20px; color:#666">أدخلي الرمز السري</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <button class="btn-heart" onclick="unlock()" style="width:100%">دخول ✨</button>
    <div id="lockMsg" style="margin-top:15px; color:red; font-size:0.9rem"></div>
  </div>
</div>
<div id="moon" onclick="toggleNight()"><div id="moonShadow"></div><div id="moonWhisper">أحبك</div></div>
<div class="world">
  <h1>عالم زينب</h1>
  <div id="loveMessage"></div>
  <div class="actions">
    <button class="btn-heart" onclick="nextLove()">نبضة حب ✨</button>
    <button class="btn-whisper" onclick="forceWhisper()">همسة القمر 🌙</button>
    <button class="btn-music" onclick="toggleMusic()">موسيقى العالم 🎵</button>
  </div>
</div>
<audio id="music" loop><source src="https://pixabay.com"></audio>
<audio id="snd-heart" src="https://mixkit.co"></audio>

<script>
// --- الإعدادات ---
const SECRET_CODE = "1234"; // الرقم السري هنا
let messageIndex = Math.floor(Math.random() * 500);

const part1 = ["زينب،", "يا أميرتي،", "في كل يوم،", "بكل نبضة،", "يا حلمي،", "يا رفيقة دربي،", "أنتِ الضياء،", "في قلبي مكانكِ،", "يا عمري الجميل،", "يا كلي،"];
const part2 = ["أنتِ الحياة،", "يزهر العالم بكِ،", "حبكِ كنز لا ينتهي،", "أجد فيكِ الأمان،", "وجودكِ هو النور،", "أنتِ سر سعادتي،", "لا معنى للأيام بدونكِ،", "نبضي ينطق باسمكِ،", "أنتِ المبتدأ والخبر،", "تكتمل أيامي معكِ،"];
const part3 = ["دائماً وأبداً.", "يا أغلى البشر.", "لأجلكِ أنتِ فقط.", "مهما طال الزمان.", "بكل حب، علاء.", "أحبكِ جداً.", "يا زينب الروح.", "يا نصفي الآخر.", "والقمر يشهد.", "يا سكن القلب."];

function unlock() {
    const val = document.getElementById("pinInput").value;
    if(val === SECRET_CODE) {
        document.getElementById("lockScreen").style.opacity = "0";
        document.getElementById("music").play().catch(()=>{});
        setTimeout(()=> document.getElementById("lockScreen").style.display="none", 1000);
    } else {
        document.getElementById("lockMsg").innerText = "الرمز غير صحيح 💗";
        document.getElementById("pinInput").value = "";
    }
}

function nextLove() {
    messageIndex++;
    const p1 = part1[messageIndex % part1.length];
    const p2 = part2[(messageIndex + 3) % part2.length];
    const p3 = part3[(messageIndex * 7) % part3.length];
    document.getElementById("loveMessage").innerHTML = `<b>${p1}</b><br>${p2}<br><i>${p3}</i><br><small style="opacity:0.5; font-size:0.7rem">— علاء</small>`;
    document.getElementById("snd-heart").play().catch(()=>{});
}

function forceWhisper() {
    const w = document.getElementById("moonWhisper");
    const phrases = ["زينب هي الحياة", "أحبكِ للأبد", "يا نبض علاء", "يا قمر ليلي", "جميلة الجميلات"];
    w.innerText = phrases[messageIndex % phrases.length];
    w.style.opacity = "1";
    setTimeout(()=> w.style.opacity="0", 4000);
}

function toggleNight() {
    document.body.classList.toggle("night");
    if(document.body.classList.contains("night")) generateStars();
}

function generateStars() {
    if(document.querySelector(".star")) return;
    for(let i=0; i<60; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.width = s.style.height = Math.random()*2+1+"px";
        s.style.left = Math.random()*100+"vw";
        s.style.top = Math.random()*100+"vh";
        document.body.appendChild(s);
    }
}

function toggleMusic() {
    const m = document.getElementById("music");
    m.paused ? m.play() : m.pause();
}

document.addEventListener("click", e => {
    if(document.getElementById("lockScreen").style.display === "none") {
        for(let i=0; i<5; i++) {
            const h = document.createElement("div");
            h.className = "heart"; h.innerText = "❤️";
            h.style.setProperty('--x', (Math.random()-0.5)*150+"px");
            h.style.left = e.clientX+"px"; h.style.top = e.clientY+"px";
            document.body.appendChild(h);
            setTimeout(()=> h.remove(), 2500);
        }
    }
});

nextLove();
</script>
</body>
</html>
