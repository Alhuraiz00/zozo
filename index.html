<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📖 كتاب الحب 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --book-width: min(1100px, 95vw);
            --book-height: clamp(450px, 70vh, 700px);
            --font-size-base: clamp(0.85rem, 3vw, 1.1rem);
            --font-size-title: clamp(1.4rem, 5vw, 2rem);
            --padding-page: clamp(15px, 4vw, 35px);
        }

        body {
            background: linear-gradient(145deg, #2c3e2f 0%, #1a2a1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Amiri', 'Traditional Arabic', serif;
            padding: clamp(10px, 3vw, 20px);
            transition: background 0.5s ease;
        }

        body.night-mode {
            background: linear-gradient(145deg, #0f172a 0%, #020617 100%);
        }

        body.night-mode .page {
            background: #1e293b;
            color: #e2e8f0;
        }

        body.night-mode .page-left {
            background: #0f172a;
        }

        body.night-mode .greeting,
        body.night-mode .poem {
            color: #cbd5e1;
        }

        body.night-mode .poem {
            background: #1e293b;
        }

        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .lock-card {
            background: #fff9ef;
            border-radius: clamp(20px, 8vw, 40px);
            padding: clamp(20px, 6vw, 40px) clamp(20px, 5vw, 35px);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid #d4af7a;
            animation: fadeInUp 0.5s ease;
        }

        .lock-card h1 {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            color: #8b5a2b;
        }

        .lock-card .lock-icon {
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin: 15px 0;
        }

        .lock-card input {
            width: 100%;
            padding: clamp(10px, 3vw, 14px);
            font-size: clamp(1rem, 4vw, 1.3rem);
            text-align: center;
            border: 2px solid #d4af7a;
            border-radius: 60px;
            background: #fffef5;
            font-family: monospace;
            letter-spacing: 5px;
            margin: 15px 0;
            outline: none;
        }

        .lock-card button {
            background: #d4af7a;
            border: none;
            padding: clamp(10px, 2.5vw, 12px) clamp(20px, 5vw, 28px);
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }

        .main-content {
            display: none;
            width: 100%;
        }

        .main-content.visible {
            display: block;
        }

        .book-container {
            perspective: 2500px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .book {
            position: relative;
            width: 100%;
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            background: #fff9ef;
            background-image: radial-gradient(circle at 25% 40%, rgba(210, 180, 140, 0.05) 2%, transparent 2.5%);
            background-size: 20px 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            padding: var(--padding-page);
            transition: all 0.8s ease;
            backface-visibility: hidden;
            border-radius: 4px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* في الكتاب العربي: الجهة اليمنى هي الصفحة الأولى */
        .page-right {
            right: 0;
            transform-origin: right center;
            transform: rotateY(0deg);
            border-left: 1px solid #e0d6c0;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
        }

        .page-left {
            left: 0;
            transform-origin: left center;
            transform: rotateY(0deg);
            border-right: 1px solid #e0d6c0;
            background: #fef7e8;
        }

        /* عند قلب الصفحة للكتاب العربي (الاتجاه معكوس) */
        .book.flipped .page-right {
            transform: rotateY(180deg);
        }

        .book.flipped .page-left {
            transform: rotateY(-180deg);
        }

        .page::-webkit-scrollbar {
            width: 4px;
        }
        .page::-webkit-scrollbar-track {
            background: #f0e4d0;
            border-radius: 4px;
        }
        .page::-webkit-scrollbar-thumb {
            background: #c5a26b;
            border-radius: 4px;
        }

        h1 {
            font-size: var(--font-size-title);
            color: #8b5a2b;
            border-bottom: 2px solid #d4af7a;
            display: inline-block;
            margin-bottom: 15px;
            font-family: 'Amiri', serif;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .greeting {
            font-size: var(--font-size-base);
            color: #5a3e1b;
            line-height: 1.7;
            margin: 10px 0;
            text-align: justify;
        }

        .poem {
            font-size: var(--font-size-base);
            font-style: italic;
            color: #7a5a3a;
            margin: 15px 0;
            padding: clamp(10px, 3vw, 15px);
            background: #faf0e1;
            border-radius: clamp(15px, 5vw, 30px) clamp(5px, 2vw, 10px) clamp(15px, 5vw, 30px) clamp(5px, 2vw, 10px);
            box-shadow: inset 0 0 5px #e0c8a8;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            gap: clamp(6px, 2vw, 12px);
            margin-bottom: clamp(10px, 3vw, 15px);
            flex-wrap: wrap;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 25px);
            margin-top: clamp(15px, 4vw, 20px);
            flex-wrap: wrap;
        }

        button, .action-btn {
            background: #d4af7a;
            border: none;
            padding: clamp(6px, 2vw, 10px) clamp(12px, 4vw, 20px);
            font-size: clamp(0.75rem, 2.8vw, 0.95rem);
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            min-height: 44px;
        }

        button:active {
            transform: scale(0.97);
        }

        .page-number {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            color: #b89a6e;
        }

        .candles {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 20px);
            margin: 15px 0;
        }
        .candle {
            width: clamp(25px, 8vw, 40px);
            height: clamp(50px, 15vw, 80px);
            background: #f5c6a0;
            border-radius: 10px 10px 5px 5px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .candle::before {
            content: "🕯️";
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(18px, 5vw, 25px);
            opacity: 0.8;
        }
        .candle.lit::before {
            content: "🔥";
        }

        .bouquet {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
            justify-content: center;
            min-height: 60px;
        }
        .flower {
            font-size: clamp(20px, 7vw, 28px);
            cursor: pointer;
        }

        .note-pad {
            background: #fff8e7;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
        .note-pad textarea {
            width: 100%;
            background: #fffef5;
            border: 1px solid #d4af7a;
            border-radius: 10px;
            padding: 8px;
            font-family: inherit;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            resize: vertical;
        }

        .chat-container {
            background: #fffef5;
            border-radius: 20px;
            padding: 12px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60%;
            overflow-y: auto;
        }
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-left: 5px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 85%;
            word-break: break-word;
            font-size: 0.9rem;
        }
        .message.wife {
            background: #d4af7a;
            color: #2c1a0a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.husband {
            background: #8b5a2b;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #d4af7a;
            font-family: inherit;
            font-size: 0.85rem;
            background: #fffef0;
        }
        .chat-input-area button {
            padding: 8px 15px;
            white-space: nowrap;
        }
        .chat-note {
            font-size: 0.7rem;
            color: #a57c4c;
            text-align: center;
            margin-top: 5px;
        }

        .speech-bubble {
            position: fixed;
            background: white;
            color: #8b5a2b;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: clamp(0.75rem, 3vw, 0.95rem);
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 10000;
            animation: floatUp 3s ease forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .speech-bubble {
                white-space: normal;
                max-width: 80%;
                text-align: center;
            }
        }

        .crystal-ball {
            background: radial-gradient(circle at 30% 30%, #a888c4, #4a2f6d);
            width: clamp(80px, 25vw, 120px);
            height: clamp(80px, 25vw, 120px);
            border-radius: 50%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: clamp(2rem, 8vw, 3rem);
        }

        .fortune-text {
            text-align: center;
            margin-top: 10px;
            font-size: clamp(0.8rem, 3vw, 1rem);
            min-height: 60px;
        }

        .petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            font-size: clamp(16px, 5vw, 25px);
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.8); }
            20% { opacity: 1; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(0.5); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .page {
                padding: 15px 12px;
            }
            .greeting, .poem {
                margin: 8px 0;
            }
            .top-bar button, .controls button {
                padding: 6px 12px;
            }
        }

        @media (max-width: 900px) and (orientation: landscape) {
            :root {
                --book-height: 80vh;
            }
            .page {
                padding: 10px 12px;
            }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            :root {
                --book-height: 65vh;
            }
        }

        .error-msg {
            color: #c0392b;
            margin-top: 10px;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            min-height: 40px;
        }
        .hint {
            margin-top: 15px;
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            color: #b89a6e;
            border-top: 1px solid #e0d6c0;
            padding-top: 12px;
        }
        .signature {
            margin-top: auto;
            text-align: center;
            font-size: var(--font-size-base);
            font-family: cursive;
            color: #a57c4c;
        }
    </style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <div class="lock-icon">🔒📖</div>
        <h1>كتاب الحب</h1>
        <p style="color: #5a3e1b; margin-bottom: 10px;">إلى زينب 🌹</p>
        <p style="font-size: clamp(0.7rem, 2.5vw, 0.85rem); color: #7a5a3a;">أدخل الرقم السري لفتح الكتاب</p>
        <input type="password" id="secretCode" maxlength="4" placeholder="____" inputmode="numeric" pattern="[0-9]*">
        <button id="unlockBtn">🔓 فتح الكتاب</button>
        <div class="error-msg" id="errorMsg"></div>
        <div class="hint">💌 تلميح: سنة خاصة في قلب زوجك (4 أرقام)</div>
    </div>
</div>

<div class="main-content" id="mainContent">
<div class="book-container">
    <div class="top-bar">
        <button id="musicToggleBtn">🎵 تشغيل الموسيقى</button>
        <button id="nightModeBtn">🌙 الوضع الليلي</button>
        <button id="surpriseBtn">💌 مفاجأة</button>
        <button id="startPetalsBtn">🌸 زهور متساقطة</button>
        <button id="voiceRecordBtn">🎤 تسجيل صوتي</button>
    </div>

    <div class="book" id="book">
        <div class="page page-right" id="rightPage"></div>
        <div class="page page-left" id="leftPage"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">➡️ السابقة</button>
        <button id="nextBtn">التالي ⬅️</button>
    </div>
    <p style="text-align: center; color: #e9dbbd; margin-top: 10px; font-size: clamp(0.6rem, 2.5vw, 0.75rem);">✨ اضغط على الأزرار أو حواف الصفحات لقلب صفحات الحب ✨</p>
</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    // الرقم السري
    const SECRET_CODE = "1989";
    const lockScreen = document.getElementById('lockScreen');
    const mainContent = document.getElementById('mainContent');
    const secretInput = document.getElementById('secretCode');
    const unlockBtn = document.getElementById('unlockBtn');
    const errorMsg = document.getElementById('errorMsg');
   
    function unlockBook() {
        if (secretInput.value === SECRET_CODE) {
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                mainContent.classList.add('visible');
                for(let i=0; i<30; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.innerHTML = ['🎉','💖','🌹','🔓','✨','💕'][Math.floor(Math.random()*6)];
                    petal.style.left = Math.random() * 100 + '%';
                    petal.style.animationDuration = 2 + Math.random() * 3 + 's';
                    petal.style.fontSize = 20 + Math.random() * 20 + 'px';
                    document.body.appendChild(petal);
                    setTimeout(() => petal.remove(), 5000);
                }
            }, 300);
        } else {
            errorMsg.innerHTML = '❌ الرقم السري غير صحيح... حاولي مرة أخرى 💔';
            secretInput.value = '';
        }
    }
   
    unlockBtn.addEventListener('click', unlockBook);
    secretInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') unlockBook(); });
    secretInput.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 4); });
   
    // ------------------ محتوى الكتاب (تم إزالة الصور) ------------------
    // المحتوى: كل عنصر يمثل صفحة واحدة. ترتيب الصفحات: 1،2،3،...
    const pagesContent = [
        `<div class="page-content"><div style="text-align:center; margin-top:15%;"><h1>زينب 🌹💖</h1><div class="poem">"وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا" 🤍</div><div class="greeting">إلى نور بيتي ✨ وبهجة عمري 😊<br>يا من تسكنين قلبي قبل بيتي 🏠❤️</div><div class="signature">♥ زوجك للأبد ♥</div></div><div class="page-number">📖 1</div></div>`,
        `<div class="page-content"><h1>✨ ذكرى لقائنا ✨</h1><div class="greeting">أتذكر أول مرة رأيتكِ فيها؟ 🌸 ابتسامتكِ أضاءت الطريق 💫 أيقنتُ أنني وجدت ما أبحث عنه 🥹💕</div><div class="poem">قالت الدنيا: "هذه زينب" 💃<br>فقلت: هذه جنتي 🌷</div><div class="greeting">أنتِ أغلى هدية 🎁✨</div><div class="page-number">📖 2</div></div>`,
        `<div class="page-content"><h1>💗 صفاتكِ 💗</h1><div class="greeting">أحب فيكِ حلمكِ وطموحكِ وحنانكِ 🌹 ضحكتكِ تداوي جراحي 😊</div><div class="poem">عيناكِ بحران عميقان 🌊 أغوص فيهما لأجد نفسي 🤍</div><div class="page-number">📖 3</div></div>`,
        `<div class="page-content"><h1>💕 حب لا يوصف 💕</h1><div class="greeting">لو كتبت بحور الدنيا حبراً 🌊 لن أستطيع وصف حبكِ 📖</div><div class="poem">زينب.. أنتِ معجزتي 🌟 ونبضي الذي لا يتوقف 💓</div><div class="greeting">أحبكِ حباً لو سئل عنه البحر لقال: لا يحيط به كلام 😊</div><div class="page-number">📖 4</div></div>`,
        `<div class="page-content"><h1>🙏 شكراً لكِ 🙏</h1><div class="greeting">شكراً لأنكِ رفيقة طريقي 🌹 شكراً لكل قهوة قدمتِها ☕</div><div class="poem">لو كان العمر أوراقاً 📄 لكنت أكتب اسمكِ في كل ورقة ✍️💕</div><div class="note-pad"><strong>📝 رسالة سريعة:</strong><br><textarea id="secretNote" rows="2" placeholder="اكتبي شيئاً... سيتم حفظه تلقائياً 💌"></textarea></div><div class="page-number">📖 5</div></div>`,
        `<div class="page-content"><h1>🤲 دعائي لكِ 🤲</h1><div class="greeting">أسأل الله أن يحميكِ 🛡️ ويسعدكِ 🎉</div><div class="poem">اللهم إني أحببت زينب 🤲 فاحفظها لي بحفظك 🤍</div><div class="candles" id="candlesArea"><div class="candle" data-lit="false"></div><div class="candle" data-lit="false"></div><div class="candle" data-lit="false"></div></div><div class="page-number">📖 6</div></div>`,
        `<div class="page-content"><h1>💍 وعد لا ينتهي 💍</h1><div class="greeting">سأظل أحبكِ حتى آخر نفس 🌹</div><div class="bouquet" id="bouquetArea"></div><div><button id="addFlowerBtn">🌹 أضف وردة للباقة</button></div><div class="greeting" style="font-size:1.5rem; text-align:center;">💖🥀💖🥀💖</div><div class="page-number">📖 7</div></div>`,
        `<div class="page-content"><h1>🔮 كرة الحب السحرية 🔮</h1><div class="greeting">انقري على الكرة لتحصلي على رسالة حب عشوائية من قلب زوجك 💕</div><div class="crystal-ball" id="crystalBall">🔮</div><div class="fortune-text" id="fortuneText">✨ انتظري المفاجأة ✨</div><div class="greeting" style="margin-top:15px; text-align:center;">كل نقرة تحمل رسالة جديدة من قلبي لكِ ❤️</div><div class="page-number">📖 8 الكرة السحرية</div></div>`,
        `<div class="page-content"><h1>💬 شات الحب المباشر 💬</h1>
        <div class="greeting">هنا يمكنكِ كتابة رسائلك لي (زوجك) وتصلني مباشرة على واتساب، وأنا سأرد عليكِ هنا في الشات 🤍</div>
        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="wifeMessage" placeholder="📝 اكتبي رسالتك لزوجك..." autocomplete="off">
                <button id="sendToWhatsAppBtn">📲 إرسال للواتساب</button>
            </div>
            <div class="chat-input-area" style="margin-top: 5px;">
                <input type="text" id="husbandReply" placeholder="✍️ رد الزوج (اكتب هنا ليظهر لزينب)">
                <button id="sendHusbandReplyBtn">💚 إرسال رد الزوج</button>
            </div>
            <div class="chat-note">💡 عندما ترسلين رسالة، سيتم فتح واتساب مع النص جاهزاً - اضغطي إرسال. وردود زوجك ستظهر لكِ فوراً.</div>
        </div>
        <div class="page-number">📖 9 شات الحب</div></div>`
    ];

    let currentPage = 1;  // currentPage يمثل رقم أول صفحة تظهر على اليمين (فردية)
    const totalPairs = Math.ceil(pagesContent.length / 2); // عدد الأزواج (الصفحة اليمنى + اليسرى)

    // في الكتاب العربي: الصفحة اليمنى (page-right) تأخذ المحتوى الفردي (1،3،5...)
    // والصفحة اليسرى (page-left) تأخذ المحتوى الزوجي (2،4،6...)
    function updateBook() {
        const rightIndex = (currentPage - 1) * 2;      // الصفحة الفردية (يمين)
        const leftIndex = rightIndex + 1;               // الصفحة الزوجية (يسار)
        
        const rightContent = (rightIndex < pagesContent.length) ? pagesContent[rightIndex] : `<div class="page-content"><div class="greeting">✨ نهاية الكتاب ✨<br>شكراً لقراءتكِ 📖💕</div><div class="page-number">📖 نهاية</div></div>`;
        const leftContent = (leftIndex < pagesContent.length) ? pagesContent[leftIndex] : `<div class="page-content"><div class="greeting">💖 للحب صفحات لا تنتهي 💖</div><div class="page-number">📖</div></div>`;
        
        document.getElementById('rightPage').innerHTML = rightContent;
        document.getElementById('leftPage').innerHTML = leftContent;
        
        book.classList.remove('flipped');
        reattachDynamicElements();
    }

    // وظائف الشات + حفظ الرسائل (نفس السابق)
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

    function saveChatHistory() {
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.sender === 'wife' ? 'wife' : 'husband'}`;
            div.innerHTML = `<strong>${msg.sender === 'wife' ? '💬 زينب' : '❤️ زوجي'}:</strong> ${msg.text}`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function addMessage(sender, text) {
        if (!text.trim()) return;
        chatHistory.push({ sender, text, timestamp: Date.now() });
        saveChatHistory();
        renderChatMessages();
    }

    function reattachDynamicElements() {
        // الملاحظات
        const noteArea = document.getElementById('secretNote');
        if(noteArea) { noteArea.value = localStorage.getItem('zainabNote') || ''; noteArea.oninput = () => localStorage.setItem('zainabNote', noteArea.value); }
       
        // الشموع
        document.querySelectorAll('.candle').forEach(c => { c.onclick = () => c.classList.toggle('lit'); });
       
        // باقة الورد
        const bouquet = document.getElementById('bouquetArea');
        const addBtn = document.getElementById('addFlowerBtn');
        if(bouquet && addBtn) {
            let flowers = JSON.parse(localStorage.getItem('flowerBouquet')) || ['🌹','🌷','🌸'];
            function renderBouquet() { bouquet.innerHTML = flowers.map(f => `<span class="flower">${f}</span>`).join(''); }
            renderBouquet();
            addBtn.onclick = () => { flowers.push('🌹'); localStorage.setItem('flowerBouquet', JSON.stringify(flowers)); renderBouquet(); };
        }
       
        // الكرة السحرية
        const ball = document.getElementById('crystalBall');
        const fortuneDiv = document.getElementById('fortuneText');
        if(ball && fortuneDiv) {
            const fortunes = ["💖 زينب، أنتِ حب عمري كله 💖","🌹 كل يوم أكتشف سبباً جديداً لحبكِ 🌹","✨ وجودكِ في حياتي هو أعظم هدية ✨","😊 ابتسامتكِ تضيء عالمي كله 😊","💕 أحبكِ أكثر من الكلمات 💕","🌟 أنتِ نجمتي التي تهتدي بها 🌟","🌸 أنتِ ربيع عمري ودفء شتائي 🌸"];
            ball.onclick = () => { fortuneDiv.innerHTML = `✨ "${fortunes[Math.floor(Math.random() * fortunes.length)]}" ✨`; };
        }

        // الشات
        const wifeInput = document.getElementById('wifeMessage');
        const sendToWhatsApp = document.getElementById('sendToWhatsAppBtn');
        const husbandReplyInput = document.getElementById('husbandReply');
        const sendHusbandReply = document.getElementById('sendHusbandReplyBtn');

        if (sendToWhatsApp && wifeInput) {
            sendToWhatsApp.onclick = () => {
                const text = wifeInput.value.trim();
                if (text === "") return;
                addMessage('wife', text);
                const encodedText = encodeURIComponent(`❤️ رسالة من زينب: ${text}`);
                const whatsappUrl = `https://wa.me/966548842250?text=${encodedText}`;
                window.open(whatsappUrl, '_blank');
                wifeInput.value = '';
            };
        }

        if (sendHusbandReply && husbandReplyInput) {
            sendHusbandReply.onclick = () => {
                const reply = husbandReplyInput.value.trim();
                if (reply === "") return;
                addMessage('husband', reply);
                husbandReplyInput.value = '';
            };
        }
        renderChatMessages();
    }

    // التنقل في الكتاب العربي: "التالي" يعني ننتقل إلى الصفحة التالية (اليمنى التالية)
    // و "السابقة" نعود للصفحة السابقة
    function nextPage() {
        if (currentPage < totalPairs) {
            book.classList.add('flipped');
            setTimeout(() => {
                currentPage++;
                updateBook();
                book.classList.remove('flipped');
            }, 400);
        }
    }
    
    function prevPage() {
        if (currentPage > 1) {
            book.classList.add('flipped');
            setTimeout(() => {
                currentPage--;
                updateBook();
                book.classList.remove('flipped');
            }, 400);
        }
    }

    const book = document.getElementById('book');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.addEventListener('click', nextPage);
    prevBtn.addEventListener('click', prevPage);
    updateBook();

    // فقاعات الحب العشوائية
    setInterval(() => {
        const msgs = ["💕 أحبك زينب", "🌹 أنتي جميلة", "😊 ابتسامتك نور", "💖 أنتي حياتي", "✨ أفتقدك", "🌸 وجودك سعادة"];
        const bubble = document.createElement('div');
        bubble.className = 'speech-bubble';
        bubble.textContent = msgs[Math.floor(Math.random() * msgs.length)];
        bubble.style.left = Math.random() * 80 + 10 + '%';
        bubble.style.top = Math.random() * 60 + 20 + '%';
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2800);
    }, 6000);

    // الأزرار الإضافية
    const music = document.getElementById('bgMusic');
    let musicPlaying = false;
    const musicToggleBtn = document.getElementById('musicToggleBtn');
    musicToggleBtn.onclick = () => { if(musicPlaying) { music.pause(); musicToggleBtn.innerHTML = '🎵 تشغيل الموسيقى'; } else { music.play(); musicToggleBtn.innerHTML = '🔇 إيقاف'; } musicPlaying = !musicPlaying; };
    document.getElementById('surpriseBtn').onclick = () => alert('💌 مفاجأة! 💌\n\nزينب، أنتِ أجمل هدية في حياتي ❤️🌹');
    document.getElementById('startPetalsBtn').onclick = () => { for(let i=0;i<30;i++) { const p = document.createElement('div'); p.className = 'petal'; p.innerHTML = ['🌸','🌼','🌻','💖'][Math.floor(Math.random()*4)]; p.style.left = Math.random() * 100 + '%'; p.style.animationDuration = 3 + Math.random() * 4 + 's'; p.style.fontSize = 15 + Math.random() * 20 + 'px'; document.body.appendChild(p); setTimeout(() => p.remove(), 6000); } };
   
    let night = false;
    const nightModeBtn = document.getElementById('nightModeBtn');
    nightModeBtn.onclick = () => { document.body.classList.toggle('night-mode'); night = !night; nightModeBtn.innerHTML = night ? '☀️ النهاري' : '🌙 الليلي'; };
   
    // تسجيل صوتي
    let mediaRecorder, chunks = [], recording = false;
    const voiceRecordBtn = document.getElementById('voiceRecordBtn');
    voiceRecordBtn.onclick = async () => {
        if(!recording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => { const audio = new Audio(URL.createObjectURL(new Blob(chunks))); audio.play(); alert('🎤 تم التسجيل!'); stream.getTracks().forEach(t => t.stop()); };
                mediaRecorder.start();
                recording = true;
                voiceRecordBtn.innerHTML = '⏹️ إيقاف';
                setTimeout(() => { if(recording) { mediaRecorder.stop(); recording = false; voiceRecordBtn.innerHTML = '🎤 تسجيل'; } }, 5000);
            } catch(e) { alert('❌ يرجى السماح بالميكروفون'); }
        } else { mediaRecorder.stop(); recording = false; voiceRecordBtn.innerHTML = '🎤 تسجيل'; }
    };
</script>
</body>
</html>
