<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>عالم ZOZO الخاص</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #fff5f7; --card: rgba(255, 255, 255, 0.85); --accent: #e91e63; --text: #331019; --blur: blur(25px); }
        [data-theme="dark"] { --bg: #0d0407; --card: rgba(30, 10, 15, 0.85); --text: #ffebee; --accent: #ff4081; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); font-family: 'Tajawal', -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; transition: 1s ease; }
        .main-sheet { position: relative; z-index: 10; background: var(--card); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: 40px 40px 0 0; border: 1px solid rgba(255, 255, 255, 0.2); padding: 30px 24px calc(35px + env(safe-area-inset-bottom)); box-shadow: 0 -10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 430px; margin: 0 auto; }
        .zozo-header { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 1.4rem; display: block; text-align: center; margin-bottom: 5px; }
        h1 { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--text); text-align: center; margin-bottom: 20px; font-weight: 800; }
        .message-box { min-height: 160px; display: flex; align-items: center; justify-content: center; text-align: center; }
        #love-msg { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 1.7; color: var(--text); font-style: italic; }
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn { border: none; padding: 18px; border-radius: 20px; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .primary { background: var(--accent); color: white; box-shadow: 0 8px 25px rgba(233, 30, 99, 0.25); }
        .secondary { background: rgba(142, 142, 147, 0.1); color: var(--accent); font-size: 0.95rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-card { background: rgba(233, 30, 99, 0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--text); opacity: 0.6; display: block; margin-bottom: 4px; font-weight: 800; }
        .stat-val { font-family: 'Amiri', serif; font-size: 1.05rem; color: var(--accent); font-weight: bold; }
        .batta-footer { margin-top: 25px; text-align: center; font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--text); opacity: 0.8; font-style: italic; border-top: 1px solid rgba(142, 142, 147, 0.1); padding-top: 15px; }
        .heart { position: absolute; pointer-events: none; animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-20vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body id="ios-body">

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com" type="audio/mpeg">
    </audio>

    <div id="heart-container"></div>

    <div class="main-sheet">
        <span class="zozo-header">To My Forever ZOZO</span>
        <h1 id="dynamic-greet">...</h1>

        <div class="message-box">
            <div id="love-msg">يتم استحضار نبضات الحنين...</div>
        </div>

        <div class="actions-area">
            <div class="btn-stack">
                <button class="btn primary" onclick="handleInteraction()">نبضة حب من قلبي &#10024;</button>
                <!-- الرابط المباشر بدون جافا سكريبت لضمان الاستجابة -->
                <a id="wa-link" href="https://wa.me" class="btn secondary">أخبريه أنكِ تفكرين به &#128140;</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">&#128141; عهد الخطوبة:</span>
                <b id="eng-timer" class="stat-val">...</b>
            </div>
            <div class="stat-card">
                <span class="stat-label">&#127968; ميثاق الزواج:</span>
                <b id="wed-timer" class="stat-val">...</b>
            </div>
        </div>

        <div class="batta-footer">
            أنتِ دائماً في قلبي.. يا بطتي الجميلة &#128037;
        </div>
    </div>

    <script>
        const u = { heart: "\u2764\ufe0f", spark: "\u2728", flower: "\ud83c\udf38", star: "\ud83c\udf1f" };
        let isMusicPlaying = false;

        const dict = {
            s: [`يا زينبُ، يا طهر الندى في الفجرِ، ${u.flower}`, `يا ZOZO، يا شمساً تضيءُ صدري، ${u.spark}`, `يا نبض قلبي، يا ملاذ صبري، ${u.heart}`, `يا روح روحي، يا اكتمال قدري، ${u.star}`],
            m: ["أنتِ السكينةُ حين يشتدُّ الضيقُ،", "أنتِ الملاذُ إذا ضلَّ الطريقُ،", "أنتِ الأمانُ والعهدُ الوثيقُ،", "أنتِ الحياةُ والنبضُ الرقيقُ،"],
            e: ["ففيكِ وجدتُ من الدنيا الأمانا.", "وحبُّكِ في حنايا الروحِ صانا.", "فطبتِ لقلبي سكَناً ومكانا.", "وزدتِ بقلبي قدراً وشأنا."]
        };

        function handleInteraction() {
            const music = document.getElementById('bg-music');
            if (!isMusicPlaying) {
                music.play().catch(e => console.log("Safari auto-play restriction handled"));
                isMusicPlaying = true;
            }
            generateMessage();
        }

        function generateMessage() {
            const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
            const msg = `${pick(dict.s)}<br>${pick(dict.m)}<br>${pick(dict.e)}`;
            document.getElementById('love-msg').innerHTML = msg;
            spawnHearts();
        }

        function spawnHearts() {
            const container = document.getElementById('heart-container');
            for(let i=0; i<8; i++) {
                const h = document.createElement('div');
                h.className = 'heart'; h.innerHTML = u.heart;
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random()*20 + 15)+'px';
                h.style.animationDuration = (Math.random()*3 + 3)+'s';
                container.appendChild(h);
                setTimeout(()=> h.remove(), 4000);
            }
        }

        function init() {
            const hour = new Date().getHours();
            const body = document.getElementById('ios-body');
            if (hour >= 18 || hour < 6) body.setAttribute('data-theme', 'dark');
            
            let timeStr = "";
            if (hour < 12) timeStr = "صباح الحب لزينب " + u.spark;
            else if (hour < 18) timeStr = "نهاري أحلى بوجودك يا ZOZO " + u.flower;
            else timeStr = "ليلة هانئة يا حبيبتي " + u.star;
                            
            document.getElementById('dynamic-greet').innerHTML = timeStr;

            // تحديث رسالة الواتساب بالصيغة الدولية المختصرة
            const waLink = document.getElementById('wa-link');
            const waMsg = encodeURIComponent("يا أغلى إنسان، فكرت فيك الآن واشتقت إليك.. أحبك يا بطلي " + u.heart);
            waLink.href = "https://wa.me?text=" + waMsg;

            updateCounters();
            generateMessage();
        }

        function updateCounters() {
            const now = new Date();
            const eng = new Date("2007-08-16"), wed = new Date("2008-08-05");
            const format = (date) => Math.floor((now - date)/(1000*60*60*24)).toLocaleString() + " يوم";
            document.getElementById('eng-timer').innerText = format(eng);
            document.getElementById('wed-timer').innerText = format(wed);
        }

        window.onload = init;
    </script>
</body>
</html>
