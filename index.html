<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار زينب الشامل ❤️</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d8d;
            --accent: #ffcfdf;
            --bg: #0a0508;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* الثيم الصباحي */
        .light-mode {
            --bg: #fff5f7;
            --primary: #e91e63;
            --accent: #331019;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            transition: background 1.5s ease;
            color: var(--accent);
        }

        /* تأثير النجوم في الخلفية (للمساء) */
        #stars { position: fixed; inset: 0; pointer-events: none; opacity: 0.3; }

        .radar-box {
            position: relative;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            border: 1px solid rgba(255, 77, 141, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 77, 141, 0.1);
        }

        /* دوائر الرادار الداخلية */
        .radar-circle {
            position: absolute;
            border: 1px solid rgba(255, 77, 141, 0.15);
            border-radius: 50%;
        }

        .sweep {
            position: absolute;
            width: 50%;
            height: 50%;
            background: conic-gradient(from 0deg, transparent 70%, var(--primary));
            top: 0; right: 0;
            transform-origin: bottom left;
            animation: rotate 4s linear infinite;
            border-radius: 100% 0 0 0;
            opacity: 0.4;
            z-index: 2;
        }

        .heart-center {
            position: relative;
            z-index: 10;
            font-size: 3.5rem;
            cursor: pointer;
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulse 1.2s infinite;
        }

        /* نقاط الذكريات */
        .memory-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            z-index: 5;
            opacity: 0;
            transition: 0.4s;
        }

        .memory-point.active { opacity: 1; transform: scale(1.5); }

        /* لوحة المعلومات */
        .info-card {
            margin-top: 30px;
            width: 85%;
            max-width: 380px;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 20;
        }

        h2 { font-family: 'Amiri', serif; color: var(--primary); margin-bottom: 8px; }
        #log-text { font-size: 0.95rem; line-height: 1.6; min-height: 45px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* شاشة الدخول */
        #gate {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .btn-start {
            background: var(--primary); color: white; border: none;
            padding: 15px 45px; border-radius: 30px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body id="main-body">

    <div id="gate">
        <h2 style="color: white; margin-bottom: 20px;">نظام الرصد العاطفي لزينب</h2>
        <button class="btn-start" onclick="unlock()">فتح الأنظمة ????</button>
    </div>

    <canvas id="stars"></canvas>

    <div class="radar-box">
        <div class="sweep"></div>
        <div class="radar-circle" style="width: 100%; height: 100%;"></div>
        <div class="radar-circle" style="width: 66%; height: 66%;"></div>
        <div class="radar-circle" style="width: 33%; height: 33%;"></div>
        
        <div class="heart-center" onclick="manualPulse()">❤️</div>

        <!-- نقاط الذكريات (يمكنك تغيير الاحداثيات والرسائل) -->
        <div class="memory-point" style="top: 20%; left: 70%;" data-msg="رصدت أول ضحكة لكِ هنا.. ترددها لا يزال في قلبي ????"></div>
        <div class="memory-point" style="top: 55%; left: 15%;" data-msg="تحذير: منطقة شديدة العشق! يمنع المرور لغير زينب ⛔"></div>
        <div class="memory-point" style="top: 80%; left: 50%;" data-msg="إشارة من المستقبل: أرى بيتنا الصغير يملؤه الحب ????"></div>
    </div>

    <div class="info-card">
        <h2 id="status-title">جاري رصد الأشواق...</h2>
        <p id="log-text">قم بلمس القلب لتنشيط الرادار</p>
    </div>

    <script>
        const body = document.getElementById('main-body');
        const logText = document.getElementById('log-text');
        const points = document.querySelectorAll('.memory-point');

        function unlock() {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => document.getElementById('gate').remove(), 500);
            applyTheme();
        }

        // 1. نظام الوقت الذكي
        function applyTheme() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 18) {
                body.classList.add('light-mode');
                document.getElementById('status-title').innerText = "صباح الخير لقلب زينب ☀️";
            } else {
                initStars(); // تفعيل النجوم ليلاً
                document.getElementById('status-title').innerText = "رصد ليلي: نجوم زينب تضيء ????";
            }
        }

        // 2. نظام اكتشاف النقاط (الذكريات)
        let angle = 0;
        setInterval(() => {
            angle = (angle + 2) % 360;
            // محاكاة تقاطع المسح مع النقاط
            points.forEach((p, index) => {
                if (Math.random() > 0.99) { // فرصة ظهور النقطة
                    activatePoint(p);
                }
            });
        }, 50);

        function activatePoint(p) {
            p.classList.add('active');
            logText.innerText = p.getAttribute('data-msg');
            logText.style.color = 'var(--primary)';
            
            setTimeout(() => {
                p.classList.remove('active');
            }, 3000);
        }

        function manualPulse() {
            logText.innerText = "تم إرسال نبضة حب فورية لـ علاء ????❤️";
            const heart = document.querySelector('.heart-center');
            heart.style.animation = 'pulse 0.3s 3';
            setTimeout(() => heart.style.animation = 'pulse 1.2s infinite', 1000);
        }

        // 3. محاكي النجوم الخلفي
        function initStars() {
            const canvas = document.getElementById('stars');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) {
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2);
                ctx.fill();
            }
        }
    </script>
</body>
</html>
